---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ V4_CFG_VIYA_HTTPROUTE_NAME }}
spec:
  parentRefs:
  - name: {{ V4_CFG_VIYA_GATEWAY_NAME }}
  hostnames:
  - "{{ V4_CFG_INGRESS_FQDN }}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ V4_CFG_VIYA_HTTPROUTE_BACKEND_SERVICE }}
      port: {{ V4_CFG_VIYA_HTTPROUTE_BACKEND_PORT }}
