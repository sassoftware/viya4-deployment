# Transformer to add topology spread constraints for stateless services (Deployments)
# to ensure zone distribution for high availability
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: stateless-zone-distribution
patch: |-
  - op: add
    path: /spec/template/spec/topologySpreadConstraints
    value:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: PLACEHOLDER_APP_NAME
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: PLACEHOLDER_APP_NAME
  - op: add
    path: /spec/template/spec/affinity
    value:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: PLACEHOLDER_APP_NAME
              topologyKey: topology.kubernetes.io/zone
          - weight: 50
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: PLACEHOLDER_APP_NAME
              topologyKey: kubernetes.io/hostname
target:
  kind: Deployment
  name: "sas-.*"
  version: v1
  # Exclude certain system deployments that may have specific placement requirements
  # Adjust the name pattern as needed based on deployment patterns
replacements:
  - source:
      kind: Deployment
      fieldPath: metadata.labels['app.kubernetes.io/name']
    targets:
      - select:
          kind: PatchTransformer
        fieldPaths:
          - patch
