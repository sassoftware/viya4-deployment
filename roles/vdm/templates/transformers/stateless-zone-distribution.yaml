# Transformer to set topology spread constraints for stateless services (Deployments)
# Targets ALL Deployments - no selector (will apply to all including non-SAS)
# labelSelector omitted - Kubernetes automatically uses each Deployment's pod template labels
# This ensures each service's replicas are spread independently, not evaluated globally
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: stateless-zone-distribution
patch: |-
  - op: replace
    path: /spec/template/spec/topologySpreadConstraints
    value:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
target:
  kind: Deployment
  version: v1
  group: apps
