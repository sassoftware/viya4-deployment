# Transformer for Workload Orchestrator StatefulSet zone distribution with balanced constraints
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: workload-orchestrator-zone-distribution
patch: |-
  - op: add
    path: /spec/template/spec/topologySpreadConstraints
    value:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: sas-workload-orchestrator
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: sas-workload-orchestrator
  - op: add
    path: /spec/template/spec/affinity
    value:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: agentpool
                  operator: In
                  values:
                    - stateful
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: sas-workload-orchestrator
              topologyKey: kubernetes.io/hostname
target:
  kind: StatefulSet
  name: "sas-workload-orchestrator"
  version: v1
