# Transformer for OpenDistro/OpenSearch zone distribution
# Patches the OpenDistroCluster Custom Resource (CR) template spec
# The OpenDistro operator then creates StatefulSets with these constraints
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: opendistro-zone-distribution
patch: |-
  - op: add
    path: /spec/template/spec/topologySpreadConstraints
    value:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            opendistro.sas.com/cluster-name: sas-opendistro
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            opendistro.sas.com/cluster-name: sas-opendistro
target:
  kind: OpenDistroCluster
  name: sas-opendistro
  group: opendistro.sas.com
  version: v1alpha1
