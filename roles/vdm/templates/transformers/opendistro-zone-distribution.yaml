# Transformer for OpenDistro/OpenSearch StatefulSet zone distribution with restrictive constraints
# Uses nodeset-name labels to allow data and master pods to be distributed independently across zones
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: opendistro-zone-distribution
patch: |-
  - op: add
    path: /spec/template/spec/topologySpreadConstraints
    value:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            opendistro.sas.com/nodeset-name: sas-opendistro-custom-data
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            opendistro.sas.com/nodeset-name: sas-opendistro-custom-data
  - op: add
    path: /spec/template/spec/affinity
    value:
{% if V4_CFG_STATEFUL_NODEPOOL_RESTRICTION | bool %}
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "{{ V4_CFG_STATEFUL_NODEPOOL_LABEL }}"
                  operator: In
                  values:
                    - stateful
{% endif %}
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  opendistro.sas.com/nodeset-name: sas-opendistro-custom-data
              topologyKey: kubernetes.io/hostname
target:
  kind: StatefulSet
  name: sas-opendistro-custom-data
  version: v1
---
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: opendistro-zone-distribution-master
patch: |-
  - op: add
    path: /spec/template/spec/topologySpreadConstraints
    value:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            opendistro.sas.com/nodeset-name: sas-opendistro-custom-master
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            opendistro.sas.com/nodeset-name: sas-opendistro-custom-master
  - op: add
    path: /spec/template/spec/affinity
    value:
{% if V4_CFG_STATEFUL_NODEPOOL_RESTRICTION | bool %}
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "{{ V4_CFG_STATEFUL_NODEPOOL_LABEL }}"
                  operator: In
                  values:
                    - stateful
{% endif %}
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  opendistro.sas.com/nodeset-name: sas-opendistro-custom-master
              topologyKey: kubernetes.io/hostname
target:
  kind: StatefulSet
  name: sas-opendistro-custom-master
  version: v1
