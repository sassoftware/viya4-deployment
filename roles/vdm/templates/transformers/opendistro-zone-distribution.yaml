# Transformer for OpenDistro/OpenSearch zone distribution
# Patches the OpenDistroCluster Custom Resource (CR) template spec
# The OpenDistro operator then creates StatefulSets with these constraints
apiVersion: builtin
kind: PatchTransformer
metadata:
  name: opendistro-zone-distribution
patch: |-
  - op: add
    path: /spec/template/spec/topologySpreadConstraints
    value:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            opendistro.sas.com/cluster-name: sas-opendistro
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            opendistro.sas.com/cluster-name: sas-opendistro
  - op: add
    path: /spec/template/spec/affinity
    value:
{% if V4_CFG_STATEFUL_NODEPOOL_RESTRICTION | bool %}
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "{{ V4_CFG_STATEFUL_NODEPOOL_LABEL }}"
                  operator: In
                  values:
                    - stateful
{% endif %}
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  opendistro.sas.com/cluster-name: sas-opendistro
              topologyKey: kubernetes.io/hostname
target:
  kind: OpenDistroCluster
  name: sas-opendistro
  group: opendistro.sas.com
  version: v1alpha1
