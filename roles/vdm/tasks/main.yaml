---
# This file contains the main tasks for the Viya Deployment Manager (VDM) role.
# It orchestrates the creation of site config, overlays, registry access, and includes all deployment assets and subcomponents.

# Create the site-config directory for deployment configuration
- name: Create site-config folder
  file:
    # Ensure the directory exists
    state: directory
    dest: "{{ DEPLOY_DIR }}/site-config/"
    mode: "0770"
  tags:
    - install
    - uninstall
    - update

# Check if sitedefault.yaml exists in the site-config directory
- name: Check if sitedefault.yaml exists
  stat:
    # Path to the sitedefault.yaml file
    path: "{{ DEPLOY_DIR }}/site-config/sitedefault.yaml"
  register: stat_result
  tags:
    - install
    - uninstall
    - update

# If sitedefault.yaml does not exist, copy it from the configured source
- name: Sitedefault
  when:
    # Only run if sitedefault.yaml is missing
    - not stat_result.stat.exists
  tags:
    - install
    - uninstall
    - update
  block:
    # Copy the sitedefault.yaml file from the configured source
    - name: Copy sitedefault.yaml
      copy:
        src: "{{ V4_CFG_SITEDEFAULT }}"
        dest: "{{ DEPLOY_DIR }}/site-config/sitedefault.yaml"
        mode: "0660"

# Include deployment asset tasks
- name: Include Deployment assets
  include_tasks: assets.yaml
  tags:
    - install
    - uninstall
    - update
    - multi-tenancy

# Validate required Gateway API resource inputs when feature flag is enabled
- name: Validate Gateway API resource configuration
  fail:
    msg: "V4_CFG_VIYA_HTTPROUTE_BACKEND_SERVICE is required when V4_CFG_GENERATE_GATEWAY_API_RESOURCES=true unless V4_CFG_VIYA_HTTPROUTES is provided"
  when:
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES is defined
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES | bool
    - V4_CFG_INGRESS_TYPE != 'envoy-gateway'
    - not (V4_CFG_VIYA_HTTPROUTE_AUTO_DISCOVER | default(false) | bool)
    - V4_CFG_VIYA_HTTPROUTES is not defined or (V4_CFG_VIYA_HTTPROUTES | length) == 0
    - V4_CFG_VIYA_HTTPROUTE_BACKEND_SERVICE is none
  tags:
    - install
    - uninstall
    - update

- name: Validate Gateway API multi-route configuration
  fail:
    msg: >-
      Each item in V4_CFG_VIYA_HTTPROUTES must include backend_service,
      or V4_CFG_VIYA_HTTPROUTE_BACKEND_SERVICE must be set as a global fallback.
  when:
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES is defined
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES | bool
    - V4_CFG_INGRESS_TYPE != 'envoy-gateway'
    - V4_CFG_VIYA_HTTPROUTES is defined
    - V4_CFG_VIYA_HTTPROUTES | length > 0
    - V4_CFG_VIYA_HTTPROUTE_BACKEND_SERVICE is none
    - (V4_CFG_VIYA_HTTPROUTES | selectattr('backend_service', 'undefined') | list | length) > 0
  tags:
    - install
    - uninstall
    - update

# HTTPRoute auto-discovery runs later, after SASDeployment manifests are generated.

# Prevent combining Gateway API routing with traditional ingress controllers to avoid duplicate LBs/public ports.
# Normalize ingress type to none during Gateway API runs so existing configs can continue safely.
- name: Normalize ingress controller selection for Gateway API resources
  set_fact:
    V4_CFG_INGRESS_TYPE: none
  when:
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES is defined
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES | bool
    - V4_CFG_INGRESS_TYPE in ['contour', 'ingress', 'istio']
  tags:
    - install
    - uninstall
    - update

- name: Gateway API ingress mode normalization notice
  debug:
    msg: "Gateway API resources are enabled, so V4_CFG_INGRESS_TYPE has been normalized to 'none' for this run."
  when:
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES is defined
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES | bool
    - V4_CFG_INGRESS_TYPE == 'none'
  tags:
    - install
    - uninstall
    - update

# For Azure Gateway API deployments, force private ingress mode to avoid public NSG exposure.
- name: Normalize ingress mode to private for Azure Gateway API resources
  set_fact:
    V4_CFG_INGRESS_MODE: private
  when:
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES is defined
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES | bool
    - PROVIDER is defined
    - "'azure' in (PROVIDER | lower)"
    - V4_CFG_INGRESS_MODE != 'private'
  tags:
    - install
    - uninstall
    - update

- name: Gateway API ingress privacy normalization notice
  debug:
    msg: "Gateway API resources are enabled on Azure, so V4_CFG_INGRESS_MODE has been normalized to 'private' for this run."
  when:
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES is defined
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES | bool
    - PROVIDER is defined
    - "'azure' in (PROVIDER | lower)"
    - V4_CFG_INGRESS_MODE == 'private'
  tags:
    - install
    - uninstall
    - update

- name: Envoy Gateway mode - check shared parent Gateway exists
  kubernetes.core.k8s_info:
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    name: "{{ V4_CFG_BASELINE_GATEWAY_NAME | default('k8s-gw') }}"
    namespace: "{{ V4_CFG_BASELINE_GATEWAY_NAMESPACE | default('gw-system') }}"
    kubeconfig: "{{ KUBECONFIG }}"
  register: shared_parent_gateway_info
  when:
    - DEPLOY | default(true) | bool
    - V4_CFG_INGRESS_TYPE == 'envoy-gateway'
  tags:
    - install
    - update

- name: Envoy Gateway mode - fail when shared parent Gateway is missing
  fail:
    msg: >-
      Shared parent Gateway {{ V4_CFG_BASELINE_GATEWAY_NAMESPACE | default('gw-system') }}/{{ V4_CFG_BASELINE_GATEWAY_NAME | default('k8s-gw') }}
      was not found. In envoy-gateway mode, run baseline first (with V4_CFG_INSTALL_GATEWAY_API=true,
      V4_CFG_INSTALL_ENVOY_GATEWAY=true, and V4_CFG_BASELINE_CREATE_BOOTSTRAP_GATEWAY=true)
      so ListenerSet can attach to an existing Gateway.
  when:
    - DEPLOY | default(true) | bool
    - V4_CFG_INGRESS_TYPE == 'envoy-gateway'
    - shared_parent_gateway_info.resources | default([]) | length == 0
  tags:
    - install
    - update

# Add base overlays and generators for kustomize
- name: Base overlays
  overlay_facts:
    # Cadence name and version for overlay selection
    cadence_name: "{{ V4_CFG_CADENCE_NAME }}"
    cadence_number: "{{ V4_CFG_CADENCE_VERSION }}"
    # Existing overlays to update
    existing: "{{ vdm_overlays }}"
    # Add base overlays, generators, and transformers
    add:
      - { resources: base, priority: 0 }
      - { resources: overlays/update-checker }
      - { configurations: overlays/required/kustomizeconfig.yaml, priority: 51 }
      - { transformers: overlays/required/transformers.yaml, priority: 60 }
      - { generators: sas-license.yaml, vdm: true }
      - { generators: sas-shared-config.yaml, vdm: true }
      - { generators: sas-consul-config.yaml, vdm: true, max: "2021.1" }
      - { generators: sas-consul-config-secret.yaml, vdm: true, min: 2021.1.1 }
      - { generators: ingress-input.yaml, vdm: true }
  tags:
    - install
    - uninstall
    - update

# Add optional Gateway API resources for Viya traffic entry via HTTPRoute
- name: Add Gateway API overlays
  overlay_facts:
    cadence_name: "{{ V4_CFG_CADENCE_NAME }}"
    cadence_number: "{{ V4_CFG_CADENCE_VERSION }}"
    existing: "{{ vdm_overlays }}"
    add:
      - { resources: gateway-api-gateway.yaml, vdm: true }
      - { resources: gateway-api-httproute.yaml, vdm: true }
  when:
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES is defined
    - V4_CFG_GENERATE_GATEWAY_API_RESOURCES | bool
    - V4_CFG_INGRESS_TYPE != 'envoy-gateway'
  tags:
    - install
    - uninstall
    - update

- name: Add Envoy Gateway ListenerSet overlays
  overlay_facts:
    cadence_name: "{{ V4_CFG_CADENCE_NAME }}"
    cadence_number: "{{ V4_CFG_CADENCE_VERSION }}"
    existing: "{{ vdm_overlays }}"
    add:
      - { resources: gateway-api-listenerset.yaml, vdm: true }
      - { transformers: gateway-api-httproute-parent-listenerset.yaml, vdm: true }
  when:
    - V4_CFG_INGRESS_TYPE == 'envoy-gateway'
  tags:
    - install
    - uninstall
    - update

# If container registry user is set, copy access file and add image pull secrets generator
- name: CR access
  when:
    # Only run if registry user is defined
    - V4_CFG_CR_USER is not none
  tags:
    - install
    - uninstall
    - update
  block:
    # Copy the container registry access file
    - name: Copy container registry access
      template:
        src: cr_access.json
        dest: "{{ DEPLOY_DIR }}/site-config/cr_access.json"
        mode: "0660"
    # Add overlay for image pull secrets generator
    - name: Add image pull secrets generator
      overlay_facts:
        cadence_name: "{{ V4_CFG_CADENCE_NAME }}"
        cadence_number: "{{ V4_CFG_CADENCE_VERSION }}"
        existing: "{{ vdm_overlays }}"
        add:
          - { generators: sas-image-pull-secrets.yaml, vdm: true }

# Include mirror tasks if not using the default SAS registry
- name: Include Mirror
  include_tasks: mirror.yaml
  when: V4_CFG_CR_HOST != "cr.sas.com"
  tags:
    - install
    - uninstall
    - update

