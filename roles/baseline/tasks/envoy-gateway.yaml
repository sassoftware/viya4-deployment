---
# This file contains the Envoy Gateway setup tasks for the baseline role.
# Purpose: Installs and manages Envoy Gateway controller resources.

# Download the Envoy Gateway install manifest to the session temp directory.
- name: Download Envoy Gateway manifest
  get_url:
    url: "{{ ENVOY_GATEWAY_MANIFEST_URL }}"
    dest: "{{ tmpdir.path }}/envoy-gateway-install.yaml"
    mode: "0640"
  tags:
    - install
    - update

# Install or update Envoy Gateway.
# Note: Don't use wait_condition as the manifest contains multiple resource types (CRDs, Deployments, Services)
# CRDs don't support wait_condition for Deployment type, causing timeout.
# Instead, apply the manifest without waiting and verify the Deployment separately.
- name: Deploy Envoy Gateway
  kubernetes.core.k8s:
    state: present
    src: "{{ tmpdir.path }}/envoy-gateway-install.yaml"
    kubeconfig: "{{ KUBECONFIG }}"
    wait: false
  register: deploy_result
  tags:
    - install
    - update

- name: Debug - Show deployment result
  debug:
    msg: "{{ deploy_result }}"
  tags:
    - install
    - update

# Wait for Envoy Gateway Deployment to be created and ready
- name: Wait for Envoy Gateway Deployment creation
  kubernetes.core.k8s_info:
    kind: Deployment
    name: envoy-gateway
    namespace: envoy-gateway-system
    kubeconfig: "{{ KUBECONFIG }}"
  register: eg_deployment
  until: eg_deployment.resources | length > 0
  retries: 30
  delay: 2
  tags:
    - install
    - update

# Restart Envoy Gateway deployment to ensure fresh pods pick up current mounted secret/config.
- name: Restart Envoy Gateway deployment
  kubernetes.core.k8s:
    state: patched
    kind: Deployment
    name: envoy-gateway
    namespace: envoy-gateway-system
    kubeconfig: "{{ KUBECONFIG }}"
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
  tags:
    - install
    - update

# Verify Envoy Gateway pod is running and ready (extended wait for slow startup).
# On timeout, collect pod and event diagnostics for root-cause visibility.
- name: Verify Envoy Gateway deployment readiness
  block:
    - name: Wait for Envoy Gateway deployment to become ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: envoy-gateway
        namespace: envoy-gateway-system
        kubeconfig: "{{ KUBECONFIG }}"
      register: envoy_deployment
      until: envoy_deployment.resources[0].status.readyReplicas | default(0) > 0
      retries: 120
      delay: 5
  rescue:
    - name: Gather Envoy Gateway pod status
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: envoy-gateway-system
        kubeconfig: "{{ KUBECONFIG }}"
        label_selectors:
          - "control-plane=envoy-gateway"
      register: envoy_gateway_pods

    - name: Gather Envoy Gateway events
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Event
        namespace: envoy-gateway-system
        kubeconfig: "{{ KUBECONFIG }}"
      register: envoy_gateway_events

    - name: Fail with detailed Envoy Gateway diagnostics
      fail:
        msg: >-
          Envoy Gateway did not become ready. Pod phases:
          {{ envoy_gateway_pods.resources | map(attribute='status.phase') | list }};
          containerStatuses:
          {{ envoy_gateway_pods.resources | map(attribute='status.containerStatuses') | list }};
          recent events:
          {{ (envoy_gateway_events.resources | sort(attribute='lastTimestamp') | map(attribute='message') | list)[-12:] }}
  tags:
    - install
    - update

# Create the GatewayClass resource pointing to the Envoy Gateway controller.
# Envoy Gateway does not auto-create a GatewayClass; it must be applied manually.
- name: Create Envoy GatewayClass
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ KUBECONFIG }}"
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      metadata:
        name: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
      spec:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller
  tags:
    - install
    - update

# Wait for GatewayClass to be accepted by the controller.
- name: Wait for GatewayClass to be accepted
  kubernetes.core.k8s_info:
    api_version: gateway.networking.k8s.io/v1
    kind: GatewayClass
    name: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
    kubeconfig: "{{ KUBECONFIG }}"
  register: gwclass_info
  until: >
    gwclass_info.resources | length > 0 and
    (gwclass_info.resources[0].status.conditions | default([]) |
     selectattr('type', 'equalto', 'Accepted') |
     selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 30
  delay: 5
  tags:
    - install
    - update

# Remove Envoy Gateway when uninstalling and the feature is enabled.
- name: Remove Envoy GatewayClass
  kubernetes.core.k8s:
    state: absent
    api_version: gateway.networking.k8s.io/v1
    kind: GatewayClass
    name: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
    kubeconfig: "{{ KUBECONFIG }}"
  tags:
    - uninstall

- name: Remove Envoy Gateway
  kubernetes.core.k8s:
    state: absent
    src: "{{ tmpdir.path }}/envoy-gateway-install.yaml"
    kubeconfig: "{{ KUBECONFIG }}"
    wait: true
  tags:
    - uninstall
