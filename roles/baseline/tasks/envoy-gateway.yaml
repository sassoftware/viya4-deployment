---
# This file contains the Envoy Gateway setup tasks for the baseline role.
# Purpose: Installs and manages Envoy Gateway controller resources.

# Download the Envoy Gateway install manifest to the session temp directory.
- name: Download Envoy Gateway manifest
  get_url:
    url: "{{ ENVOY_GATEWAY_MANIFEST_URL }}"
    dest: "{{ tmpdir.path }}/envoy-gateway-install.yaml"
    mode: "0640"
  tags:
    - install
    - update

# Install or update Envoy Gateway.
# Note: Don't use wait_condition as the manifest contains multiple resource types (CRDs, Deployments, Services)
# CRDs don't support wait_condition for Deployment type, causing timeout.
# Instead, apply the manifest without waiting and verify the Deployment separately.
- name: Deploy Envoy Gateway
  kubernetes.core.k8s:
    state: present
    src: "{{ tmpdir.path }}/envoy-gateway-install.yaml"
    kubeconfig: "{{ KUBECONFIG }}"
    wait: false
  register: deploy_result
  tags:
    - install
    - update

- name: Debug - Show deployment result
  debug:
    msg: "{{ deploy_result }}"
  tags:
    - install
    - update

# Wait for Envoy Gateway Deployment to be created and ready
- name: Wait for Envoy Gateway Deployment creation
  kubernetes.core.k8s_info:
    kind: Deployment
    name: envoy-gateway
    namespace: envoy-gateway-system
    kubeconfig: "{{ KUBECONFIG }}"
  register: eg_deployment
  until: eg_deployment.resources | length > 0
  retries: 30
  delay: 2
  tags:
    - install
    - update

# Restart Envoy Gateway deployment to ensure fresh pods pick up current mounted secret/config.
- name: Restart Envoy Gateway deployment
  kubernetes.core.k8s:
    state: patched
    kind: Deployment
    name: envoy-gateway
    namespace: envoy-gateway-system
    kubeconfig: "{{ KUBECONFIG }}"
    definition:
      spec:
        template:
          metadata:
            annotations:
              kubectl.kubernetes.io/restartedAt: "{{ ansible_date_time.iso8601 }}"
  tags:
    - install
    - update

# Verify Envoy Gateway pod is running and ready (extended wait for slow startup).
# On timeout, collect pod and event diagnostics for root-cause visibility.
- name: Verify Envoy Gateway deployment readiness
  block:
    - name: Wait for Envoy Gateway deployment to become ready
      kubernetes.core.k8s_info:
        kind: Deployment
        name: envoy-gateway
        namespace: envoy-gateway-system
        kubeconfig: "{{ KUBECONFIG }}"
      register: envoy_deployment
      until: envoy_deployment.resources[0].status.readyReplicas | default(0) > 0
      retries: 120
      delay: 5
  rescue:
    - name: Gather Envoy Gateway pod status
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: envoy-gateway-system
        kubeconfig: "{{ KUBECONFIG }}"
        label_selectors:
          - "control-plane=envoy-gateway"
      register: envoy_gateway_pods

    - name: Gather Envoy Gateway events
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Event
        namespace: envoy-gateway-system
        kubeconfig: "{{ KUBECONFIG }}"
      register: envoy_gateway_events

    - name: Fail with detailed Envoy Gateway diagnostics
      fail:
        msg: >-
          Envoy Gateway did not become ready. Pod phases:
          {{ envoy_gateway_pods.resources | map(attribute='status.phase') | list }};
          containerStatuses:
          {{ envoy_gateway_pods.resources | map(attribute='status.containerStatuses') | list }};
          recent events:
          {{ (envoy_gateway_events.resources | sort(attribute='lastTimestamp') | map(attribute='message') | list)[-12:] }}
  tags:
    - install
    - update

# Create the GatewayClass resource pointing to the Envoy Gateway controller.
# Envoy Gateway does not auto-create a GatewayClass; it must be applied manually.
- name: Configure EnvoyProxy for Azure internal LoadBalancer
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ KUBECONFIG }}"
    definition:
      apiVersion: gateway.envoyproxy.io/v1alpha1
      kind: EnvoyProxy
      metadata:
        name: envoy-gateway-private-lb
        namespace: envoy-gateway-system
      spec:
        provider:
          type: Kubernetes
          kubernetes:
            envoyService:
              annotations:
                service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  when:
    - PROVIDER is defined
    - "'azure' in (PROVIDER | lower)"
    - V4_CFG_INGRESS_MODE == "private"
  tags:
    - install
    - update

- name: Create Envoy GatewayClass (Azure private LB)
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ KUBECONFIG }}"
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      metadata:
        name: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
      spec:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller
        parametersRef:
          group: gateway.envoyproxy.io
          kind: EnvoyProxy
          name: envoy-gateway-private-lb
          namespace: envoy-gateway-system
  when:
    - PROVIDER is defined
    - "'azure' in (PROVIDER | lower)"
    - V4_CFG_INGRESS_MODE == "private"
  tags:
    - install
    - update

- name: Create Envoy GatewayClass (default)
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ KUBECONFIG }}"
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      metadata:
        name: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
      spec:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller
  when:
    - PROVIDER is not defined or "'azure' not in (PROVIDER | lower)" or V4_CFG_INGRESS_MODE != "private"
  tags:
    - install
    - update

# Wait for GatewayClass to be accepted by the controller.
- name: Wait for GatewayClass to be accepted
  kubernetes.core.k8s_info:
    api_version: gateway.networking.k8s.io/v1
    kind: GatewayClass
    name: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
    kubeconfig: "{{ KUBECONFIG }}"
  register: gwclass_info
  until: >
    gwclass_info.resources | length > 0 and
    (gwclass_info.resources[0].status.conditions | default([]) |
     selectattr('type', 'equalto', 'Accepted') |
     selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 30
  delay: 5
  tags:
    - install
    - update

# Optional baseline bootstrap Gateway for cluster-side Envoy validation/use cases.
- name: Create baseline bootstrap Gateway
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ KUBECONFIG }}"
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: "{{ V4_CFG_BASELINE_GATEWAY_NAME }}"
        namespace: "{{ V4_CFG_BASELINE_GATEWAY_NAMESPACE }}"
      spec:
        gatewayClassName: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
        listeners:
{% if V4_CFG_TLS_MODE == "disabled" %}
          - name: http
            protocol: HTTP
            port: 80
{% if V4_CFG_INGRESS_FQDN is defined and V4_CFG_INGRESS_FQDN is not none %}
            hostname: "{{ V4_CFG_INGRESS_FQDN }}"
{% endif %}
            allowedRoutes:
              namespaces:
                from: All
{% else %}
{% if V4_CFG_BASELINE_GATEWAY_ENABLE_HTTP_LISTENER | default(true) | bool %}
          - name: http
            protocol: HTTP
            port: 80
{% if V4_CFG_INGRESS_FQDN is defined and V4_CFG_INGRESS_FQDN is not none %}
            hostname: "{{ V4_CFG_INGRESS_FQDN }}"
{% endif %}
            allowedRoutes:
              namespaces:
                from: All
{% endif %}
          - name: https
            protocol: HTTPS
            port: 443
{% if V4_CFG_INGRESS_FQDN is defined and V4_CFG_INGRESS_FQDN is not none %}
            hostname: "{{ V4_CFG_INGRESS_FQDN }}"
{% endif %}
            tls:
              mode: Terminate
              certificateRefs:
                - kind: Secret
                  name: sas-ingress-certificate
            allowedRoutes:
              namespaces:
                from: All
{% endif %}
  when:
    - V4_CFG_BASELINE_CREATE_BOOTSTRAP_GATEWAY is defined
    - V4_CFG_BASELINE_CREATE_BOOTSTRAP_GATEWAY | bool
  tags:
    - install
    - update

# Remove Envoy Gateway when uninstalling and the feature is enabled.
- name: Remove Envoy GatewayClass
  kubernetes.core.k8s:
    state: absent
    api_version: gateway.networking.k8s.io/v1
    kind: GatewayClass
    name: "{{ ENVOY_GATEWAY_GATEWAYCLASS_NAME }}"
    kubeconfig: "{{ KUBECONFIG }}"
  tags:
    - uninstall

- name: Remove baseline bootstrap Gateway
  kubernetes.core.k8s:
    state: absent
    api_version: gateway.networking.k8s.io/v1
    kind: Gateway
    name: "{{ V4_CFG_BASELINE_GATEWAY_NAME }}"
    namespace: "{{ V4_CFG_BASELINE_GATEWAY_NAMESPACE }}"
    kubeconfig: "{{ KUBECONFIG }}"
  ignore_errors: true
  when:
    - V4_CFG_BASELINE_CREATE_BOOTSTRAP_GATEWAY is defined
    - V4_CFG_BASELINE_CREATE_BOOTSTRAP_GATEWAY | bool
  tags:
    - uninstall

- name: Remove EnvoyProxy Azure private LB config
  kubernetes.core.k8s:
    state: absent
    api_version: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyProxy
    name: envoy-gateway-private-lb
    namespace: envoy-gateway-system
    kubeconfig: "{{ KUBECONFIG }}"
  ignore_errors: true
  tags:
    - uninstall

- name: Remove Envoy Gateway
  kubernetes.core.k8s:
    state: absent
    src: "{{ tmpdir.path }}/envoy-gateway-install.yaml"
    kubeconfig: "{{ KUBECONFIG }}"
    wait: true
  tags:
    - uninstall
