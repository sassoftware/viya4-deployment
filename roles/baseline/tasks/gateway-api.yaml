---
# This file contains the Gateway API setup tasks for the baseline role.
# Purpose: Installs and manages Gateway API CRDs used by Gateway API providers.

# Download the Gateway API manifest to the session temp directory.
- name: Download Gateway API manifest
  get_url:
    url: "{{ GATEWAY_API_MANIFEST_URL }}"
    dest: "{{ tmpdir.path }}/gateway-api-install-orig.yaml"
    mode: "0640"
  tags:
    - install
    - update

# Remove ValidatingAdmissionPolicy and ValidatingAdmissionPolicyBinding from the manifest
# These resources can block CRD deployment due to conflicts between channels
- name: Filter out blocking policies from Gateway API manifest
  shell: |
    python3 << 'EOF'
    import yaml
    
    input_file = "{{ tmpdir.path }}/gateway-api-install-orig.yaml"
    output_file = "{{ tmpdir.path }}/gateway-api-install.yaml"
    
    # Read entire file first
    with open(input_file, 'r') as f:
        content = f.read()
    
    # Parse all documents
    docs = list(yaml.safe_load_all(content))
    
    # Filter out blocking resources
    filtered_docs = []
    for doc in docs:
        if doc is None:
            continue
        kind = doc.get('kind', '')
        if kind not in ['ValidatingAdmissionPolicy', 'ValidatingAdmissionPolicyBinding']:
            filtered_docs.append(doc)
    
    # Write filtered documents
    with open(output_file, 'w') as f:
        yaml.dump_all(filtered_docs, f, default_flow_style=False)
    
    print(f"Filtered manifest: kept {len(filtered_docs)} resources")
    EOF
  tags:
    - install
    - update

# Remove ValidatingAdmissionPolicy and binding to prevent conflicts between standard and experimental CRDs
# This policy may exist from previous deployments and can block CRD creation
- name: Remove Gateway API ValidatingAdmissionPolicyBinding
  kubernetes.core.k8s:
    state: absent
    kind: ValidatingAdmissionPolicyBinding
    name: safe-upgrades.gateway.networking.k8s.io
    kubeconfig: "{{ KUBECONFIG }}"
    wait: true
  ignore_errors: true
  tags:
    - install
    - update

- name: Remove Gateway API ValidatingAdmissionPolicy
  kubernetes.core.k8s:
    state: absent
    kind: ValidatingAdmissionPolicy
    name: safe-upgrades.gateway.networking.k8s.io
    kubeconfig: "{{ KUBECONFIG }}"
    wait: true
  ignore_errors: true
  tags:
    - install
    - update

# Verify policy and binding are removed before proceeding
- name: Verify ValidatingAdmissionPolicy is removed
  kubernetes.core.k8s_info:
    kind: ValidatingAdmissionPolicy
    name: safe-upgrades.gateway.networking.k8s.io
    kubeconfig: "{{ KUBECONFIG }}"
  register: policy_check
  until: policy_check.resources | length == 0
  retries: 10
  delay: 2
  ignore_errors: true
  tags:
    - install
    - update

# Create Envoy Gateway namespace if it doesn't exist
- name: Create Envoy Gateway namespace
  kubernetes.core.k8s:
    state: present
    kind: Namespace
    name: envoy-gateway-system
    kubeconfig: "{{ KUBECONFIG }}"
  tags:
    - install
    - update

# Create Envoy Gateway TLS secret for HTTPS listeners when TLS is enabled.
# Envoy Gateway deployment mounts this secret, so it must always exist.
- name: Prepare Envoy Gateway TLS materials
  when:
    - V4_CFG_TLS_MODE != "disabled"
  tags:
    - install
    - update
  block:
    - name: Remove existing Envoy Gateway TLS secret for clean recreation
      kubernetes.core.k8s:
        state: absent
        kind: Secret
        name: envoy-gateway
        namespace: envoy-gateway-system
        kubeconfig: "{{ KUBECONFIG }}"
        wait: true

    - name: Check if user-provided TLS files are configured
      set_fact:
        envoy_gateway_has_user_tls: >
          {{
            (V4_CFG_TLS_CERT is defined and V4_CFG_TLS_CERT is not none and (V4_CFG_TLS_CERT | string | length) > 0)
            and
            (V4_CFG_TLS_KEY is defined and V4_CFG_TLS_KEY is not none and (V4_CFG_TLS_KEY | string | length) > 0)
          }}

    - name: Generate temporary self-signed cert for Envoy Gateway
      shell: |
        openssl req -x509 -nodes -newkey rsa:2048 -sha256 \
          -keyout "{{ tmpdir.path }}/envoy-gateway-tls.key" \
          -out "{{ tmpdir.path }}/envoy-gateway-tls.crt" \
          -days 365 -subj "/CN=envoy-gateway.local"
      args:
        executable: /bin/bash
      when: not envoy_gateway_has_user_tls

    - name: Create Envoy Gateway TLS secret
      kubernetes.core.k8s:
        state: present
        kind: Secret
        name: envoy-gateway
        namespace: envoy-gateway-system
        definition:
          apiVersion: v1
          metadata:
            name: envoy-gateway
            namespace: envoy-gateway-system
          type: Opaque
          data:
            tls.crt: "{{ lookup('file', (V4_CFG_TLS_CERT if envoy_gateway_has_user_tls else (tmpdir.path + '/envoy-gateway-tls.crt'))) | b64encode }}"
            tls.key: "{{ lookup('file', (V4_CFG_TLS_KEY if envoy_gateway_has_user_tls else (tmpdir.path + '/envoy-gateway-tls.key'))) | b64encode }}"
            ca.crt: "{{ lookup('file', (V4_CFG_TLS_CERT if envoy_gateway_has_user_tls else (tmpdir.path + '/envoy-gateway-tls.crt'))) | b64encode }}"
        kubeconfig: "{{ KUBECONFIG }}"

# Install or update Gateway API CRDs.
- name: Deploy Gateway API CRDs
  kubernetes.core.k8s:
    state: present
    src: "{{ tmpdir.path }}/gateway-api-install.yaml"
    kubeconfig: "{{ KUBECONFIG }}"
    wait: true
  tags:
    - install
    - update

# Remove Gateway API CRDs when uninstalling and the feature is enabled.
- name: Remove Gateway API CRDs
  kubernetes.core.k8s:
    state: absent
    src: "{{ tmpdir.path }}/gateway-api-install.yaml"
    kubeconfig: "{{ KUBECONFIG }}"
    wait: true
  tags:
    - uninstall
